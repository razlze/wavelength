name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Build, Prisma Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wavelength_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: wavelength
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/wavelength_ci
      DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/wavelength_ci
      SHADOW_DATABASE_URL: postgresql://ci:ci@localhost:5432/wavelength_ci_shadow
      JWT_SECRET: ci-dev-secret-not-for-production
      NEXT_PUBLIC_APP_ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create shadow database
        run: PGPASSWORD=ci psql -h localhost -U ci -d wavelength_ci -c "CREATE DATABASE wavelength_ci_shadow;"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wavelength/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check migrations are up-to-date with schema
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code

      - name: Build
        run: npm run build
