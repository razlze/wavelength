name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Build, Prisma Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wavelength
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/wavelength_ci?schema=public
      JWT_SECRET: ci-dev-secret-not-for-production
      NEXT_PUBLIC_APP_ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wavelength/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Build
        run: npm run build
